name: Auto Generate Cover+Test

# Dispara automaticamente após o CI passar em um PR,
# ou manualmente pelo Actions para testes pontuais.
on:
  workflow_dispatch:
    inputs:
      changed_files:
        description: 'Arquivos .kt para processar (separados por espaço ou quebra de linha)'
        required: true
        default: ''

  workflow_run:
    workflows: ["Build and Test for PRs"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    name: Generate Unit Tests with Claude
    runs-on: ubuntu-latest

    # workflow_dispatch: sempre roda
    # workflow_run: só roda se o CI passou e não foi aberto pelo bot
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.actor.login != 'github-actions[bot]'
      )

    steps:
      # ── 1. Normaliza o contexto para os dois gatilhos ─────────────────────────
      - name: Resolve trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "head_sha=${{ github.sha }}"                    >> "$GITHUB_OUTPUT"
            echo "base_ref=main"                                 >> "$GITHUB_OUTPUT"
            echo "pr_number=manual"                              >> "$GITHUB_OUTPUT"
            echo "is_manual=true"                                >> "$GITHUB_OUTPUT"
            printf "raw_files<<EOF\n%s\nEOF\n" \
              "${{ github.event.inputs.changed_files }}"         >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.event.workflow_run.head_sha }}"                        >> "$GITHUB_OUTPUT"
            echo "base_ref=${{ github.event.workflow_run.pull_requests[0].base.ref }}"       >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.workflow_run.pull_requests[0].number }}"        >> "$GITHUB_OUTPUT"
            echo "is_manual=false"                               >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Java (reusa a action existente do projeto) ─────────────────────────
      - name: Setup Java
        uses: ./.github/actions/java

      # ── 4. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install anthropic

      # ── 5. Detecta arquivos alterados ─────────────────────────────────────────
      #       workflow_dispatch → usa o input direto
      #       workflow_run      → faz git diff contra a base do PR
      - name: Get changed Kotlin files in craftd-core
        id: changed
        run: |
          if [ "${{ steps.ctx.outputs.is_manual }}" = "true" ]; then
            # Modo manual: normaliza o input (espaços ou newlines) e filtra só craftd-core
            CHANGED=$(echo "${{ steps.ctx.outputs.raw_files }}" \
              | tr ' ' '\n' \
              | grep -E "^android_kmp/craftd-core/src/(common|android)Main/.*\.kt$" \
              | grep -v "Test\.kt" \
              || true)
          else
            # Modo automático: diff entre base e head do PR
            BASE=${{ github.event.workflow_run.pull_requests[0].base.sha }}
            HEAD=${{ steps.ctx.outputs.head_sha }}
            CHANGED=$(git diff --name-only "$BASE"..."$HEAD" \
              | grep -E "^android_kmp/craftd-core/src/(common|android)Main/.*\.kt$" \
              | grep -v "Test\.kt" \
              || true)
          fi

          echo "Arquivos detectados:"
          echo "$CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            printf "files<<EOF\n%s\nEOF\n" "$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Chama a Claude API para gerar os testes ────────────────────────────
      - name: Generate unit tests with Claude API
        if: steps.changed.outputs.has_changes == 'true'
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python .github/scripts/generate_tests.py

      # ── 7. Verifica se algum arquivo foi gerado ───────────────────────────────
      - name: Check generated files
        if: steps.changed.outputs.has_changes == 'true'
        id: check
        run: |
          COUNT=$(git status --short | grep -c "Test\.kt" || true)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt "0" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            NAMES=$(git status --short \
              | grep "Test\.kt" \
              | awk '{print $2}' \
              | xargs -I{} basename {} \
              | paste -sd ", ")
            echo "covered_names=$NAMES" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 8. Cria branch e faz commit dos testes ────────────────────────────────
      - name: Commit generated tests
        if: steps.check.outputs.has_tests == 'true'
        id: commit
        run: |
          PR_NUMBER="${{ steps.ctx.outputs.pr_number }}"
          BRANCH="chore/add-tests-craftd-core-pr-${PR_NUMBER}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add android_kmp/craftd-core/src/test/
          git commit -m "test: add unit tests for craftd-core (auto-generated via Claude)"
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 9. Abre o PR com os testes gerados ────────────────────────────────────
      - name: Open Pull Request with generated tests
        if: steps.check.outputs.has_tests == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.ctx.outputs.pr_number }}"
          BRANCH="${{ steps.commit.outputs.branch }}"
          BASE_BRANCH="${{ steps.ctx.outputs.base_ref }}"
          COVERED="${{ steps.check.outputs.covered_names }}"

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "[Auto] Add unit tests for craftd-core" \
            --body "$(cat <<EOF
          ## Auto-generated Unit Tests

          Este PR foi gerado automaticamente pelo workflow **Auto Generate Unit Tests** usando a Claude API (claude-opus-4-6).

          ### Arquivos cobertos
          \`\`\`
          ${COVERED}
          \`\`\`

          ### Como funciona
          1. Um PR tocou arquivos em \`android_kmp/craftd-core\`
          2. Após o CI passar, o workflow detectou arquivos Kotlin sem cobertura
          3. Claude analisou cada arquivo e gerou testes **JUnit4 + MockK**
          4. Este PR foi criado automaticamente com o resultado

          ### Checklist de revisão
          - [ ] Testes compilam sem erros (\`./gradlew testDebugUnitTest\`)
          - [ ] Testes cobrem os principais caminhos de lógica
          - [ ] Edge cases tratados (null, vazio, JSON inválido)
          - [ ] Nomenclatura segue as convenções do projeto

          > Triggered by PR #${PR_NUMBER}
          EOF
          )"
